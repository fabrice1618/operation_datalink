<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); font-family: var(--font-term); padding: 20px; color: var(--p-text); }
  .brand { font-size: 40px; color: var(--p-bright); letter-spacing: .06em; text-shadow: var(--text-glow-strong); }
  .body { font-size: 19px; margin-top: 6px; }
  .dim { color: var(--p-dim); }
  .meta { font-size: 13px; color: var(--p-faint); letter-spacing: .1em; margin-top: 12px; }
</style>
</head>
<body class="datalink">
  <div class="brand">OP. DATALINK</div>
  <div class="body">A:\&gt; Le quick brown fox 0123456789 <span class="dim">// abcdef</span></div>
  <div class="meta">VT323 · poids unique · l'intensité fait le gras</div>
</body>
</html>
