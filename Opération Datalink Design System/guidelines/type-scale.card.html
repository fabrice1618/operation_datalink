<!-- @dsCard group="Type" viewport="700x160" name="Type scale" subtitle="Runs large — VT323 base ≈ 19px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); font-family: var(--font-term); padding: 14px 20px; color: var(--p-text); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 3px 0; border-bottom: 1px solid var(--p-ghost); vertical-align: baseline; }
  td:first-child { color: var(--p-faint); font-size: 13px; letter-spacing: .1em; width: 90px; text-transform: uppercase; }
  td:last-child { color: var(--p-faint); font-size: 13px; text-align: right; width: 70px; }
  .s { color: var(--p-bright); text-shadow: var(--text-glow); }
</style>
</head>
<body class="datalink">
  <table>
    <tr><td>xl</td><td class="s" style="font-size:48px;line-height:1">STAT 07</td><td>3rem</td></tr>
    <tr><td>lg</td><td class="s" style="font-size:32px">Titre d'écran</td><td>2rem</td></tr>
    <tr><td>base</td><td class="s" style="font-size:19px">A:\&gt; corps de texte</td><td>1.18rem</td></tr>
    <tr><td>sm</td><td class="s" style="font-size:17px;text-transform:uppercase">contrôles / nav</td><td>1.05rem</td></tr>
    <tr><td>xs</td><td class="s" style="font-size:15px;letter-spacing:.1em;text-transform:uppercase">labels</td><td>.95rem</td></tr>
  </table>
</body>
</html>
