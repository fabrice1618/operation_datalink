<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Tight terminal rows" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); font-family: var(--font-term); padding: 20px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--p-bright); width: 100%; min-width: 4px; box-shadow: var(--box-glow); }
  .n { color: var(--p-dim); font-size: 13px; letter-spacing: .06em; margin-top: 6px; }
  .px { color: var(--p-faint); font-size: 12px; }
</style>
</head>
<body class="datalink">
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="n">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="n">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="height:56px"></div><div class="n">14</div><div class="px">56</div></div>
  </div>
</body>
</html>
