<!-- @dsCard group="Brand" viewport="700x180" name="Boot & glyphs" subtitle="POST sequence + the glyph set" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); font-family: var(--font-term); padding: 20px; color: var(--p-text); font-size: 16px; line-height: 1.55; }
  .ok { color: var(--p-bright); }
  .dim { color: var(--p-dim); }
  .glyphs { margin-top: 12px; display: flex; gap: 18px; border-top: 1px solid var(--p-ghost); padding-top: 10px; }
  .g { text-align: center; }
  .g b { font-size: 22px; color: var(--p-bright); }
  .g span { display: block; font-size: 11px; color: var(--p-faint); letter-spacing: .06em; text-transform: uppercase; margin-top: 4px; }
</style>
</head>
<body class="datalink">
  <div><span class="dim">DATALINK BIOS v2.0</span> ......... <span class="ok">OK</span></div>
  <div>MÉMOIRE 640K ............... <span class="ok">OK</span></div>
  <div>LIAISON CHIFFRÉE .......... <span class="ok">ÉTABLIE</span></div>
  <div class="glyphs">
    <div class="g"><b>▌</b><span>titre</span></div>
    <div class="g"><b>▸</b><span>sélection</span></div>
    <div class="g"><b>█</b><span>curseur</span></div>
    <div class="g"><b>┤├</b><span>cadre</span></div>
    <div class="g"><b>░▒▓</b><span>jauge</span></div>
    <div class="g"><b>&gt;&gt;</b><span>système</span></div>
    <div class="g"><b>//</b><span>note</span></div>
  </div>
</body>
</html>
