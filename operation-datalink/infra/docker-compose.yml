# Opération Datalink — infrastructure du TP CTF réseau
#
# Deux serveurs (srv interne + darkdrop passerelle), trois postes "acteurs"
# qui rejouent le scénario, et deux sondes tcpdump partageant la pile réseau
# des serveurs pour produire des captures propres (suivi de flux fonctionnel).
#
# Usage : voir ../Makefile (make capture) et ../run-capture.sh

name: datalink

networks:
  lan:
    name: datalink_lan
    ipam:
      config:
        - subnet: 10.13.37.0/24
          gateway: 10.13.37.1
  # Reseau partage du reverse proxy (cree par le repo reverse_proxy).
  reverse-proxy-net:
    name: reverse-proxy-net
    external: true

services:

  # ---------------------------------------------------------------------------
  # Serveur interne de NordExport : chat HTTP, SMTP, telnet
  # ---------------------------------------------------------------------------
  srv:
    build: ./images/srv
    image: datalink-srv
    container_name: datalink-srv
    hostname: srv-nordexport
    networks:
      lan:
        ipv4_address: 10.13.37.50
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket;socket.create_connection(('127.0.0.1',80),3)"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Serveur externe "darkdrop" (réception des données volées) : FTP + DNS
  # ---------------------------------------------------------------------------
  darkdrop:
    build: ./images/darkdrop
    image: datalink-darkdrop
    container_name: datalink-darkdrop
    hostname: darkdrop-exchange
    networks:
      lan:
        ipv4_address: 10.13.37.200
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket;socket.create_connection(('127.0.0.1',21),3)"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Sondes de capture (partagent la pile réseau du serveur cible)
  # ---------------------------------------------------------------------------
  cap-srv:
    build: ./images/capture
    image: datalink-capture
    container_name: datalink-cap-srv
    network_mode: "service:srv"
    depends_on:
      srv:
        condition: service_healthy
    volumes:
      - ./capture:/caps
    command: ["-i", "eth0", "-s", "0", "-U", "-w", "/caps/scelle-01_serveur-interne.pcap"]

  cap-darkdrop:
    build: ./images/capture
    image: datalink-capture
    container_name: datalink-cap-darkdrop
    network_mode: "service:darkdrop"
    depends_on:
      darkdrop:
        condition: service_healthy
    volumes:
      - ./capture:/caps
    command: ["-i", "eth0", "-s", "0", "-U", "-w", "/caps/scelle-02_passerelle.pcap"]

  # ---------------------------------------------------------------------------
  # Acteurs : postes des suspects, rejouent le scénario puis s'arrêtent
  # ---------------------------------------------------------------------------
  poste-sofia:
    build: ./images/acteurs
    image: datalink-acteurs
    container_name: datalink-poste-sofia
    hostname: pc-sofia
    networks:
      lan:
        ipv4_address: 10.13.37.20
    depends_on:
      srv:
        condition: service_healthy
      darkdrop:
        condition: service_healthy
    command: ["python3", "/opt/scenario/sofia.py"]

  poste-marc:
    build: ./images/acteurs
    image: datalink-acteurs
    container_name: datalink-poste-marc
    hostname: pc-marc
    networks:
      lan:
        ipv4_address: 10.13.37.10
    depends_on:
      srv:
        condition: service_healthy
      darkdrop:
        condition: service_healthy
    command: ["python3", "/opt/scenario/marc.py"]

  poste-intrus:
    build: ./images/acteurs
    image: datalink-acteurs
    container_name: datalink-poste-intrus
    hostname: kali-op
    networks:
      lan:
        ipv4_address: 10.13.37.66
    # Emission d'ARP gratuits (positionnement MITM, defi bonus) via scapy.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      srv:
        condition: service_healthy
    command: ["python3", "/opt/scenario/intrus.py"]

  # Poste "bruit de fond" : trafic legitime (DNS/HTTP/SMTP anodins) + 1 leurre.
  # Force le filtrage du signal et piege le "grep DATALINK" aveugle.
  poste-bruit:
    build: ./images/acteurs
    image: datalink-acteurs
    container_name: datalink-poste-bruit
    hostname: pc-it
    networks:
      lan:
        ipv4_address: 10.13.37.40
    depends_on:
      srv:
        condition: service_healthy
      darkdrop:
        condition: service_healthy
    command: ["python3", "/opt/scenario/bruit.py"]

  # ---------------------------------------------------------------------------
  # Portail pédagogique : énoncé, soumission de flags, dépôt PV
  # Accès étudiants : http://<IP-hôte>:8080
  # Tableau de bord : http://<IP-hôte>:8080/dashboard?token=prof2024
  # ---------------------------------------------------------------------------
  portal:
    build: ./images/portal
    image: datalink-portal
    container_name: datalink-portal
    # default : projet datalink ; reverse-proxy-net : expose au reverse proxy
    # (nginx atteint datalink-portal:5000 sur ce reseau partage).
    networks:
      - default
      - reverse-proxy-net
    ports:
      - "8080:5000"
    volumes:
      - ../enonce:/data/enonce:ro
      - ./capture:/data/captures:ro
      - portal-data:/data
      # dev — édition des templates à chaud (cf. TEMPLATES_AUTO_RELOAD)
      - ./images/portal/templates:/opt/portal/templates:ro
      # dev — code applicatif monté : un simple `restart` suffit (pas de rebuild)
      - ./images/portal/app.py:/opt/portal/app.py:ro
      # dev — assets statiques (logo de la navbar) servis à chaud
      - ./images/portal/static:/opt/portal/static:ro
    environment:
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY manquant — copier .env.example en .env}"
      # dev — recharge les templates modifiés sans reconstruire l'image
      TEMPLATES_AUTO_RELOAD: "1"
      DASHBOARD_TOKEN: "prof2024"
      ACCESS_CODE: "DATALINK-2026"
      # Scénario à deux phases (la phase 2 exige l'infra Docker live).
      # 0 = portail en phase 1 uniquement (défaut) ; 1 = active la phase 2.
      # Surcharger via infra/.env (PHASE2_ENABLED=1).
      PHASE2_ENABLED: "${PHASE2_ENABLED:-0}"
      # Empreintes SHA-256 des flags — jamais le flag en clair (cf. evolution1.md, P1).
      # Régénérer après modification d'un flag : python3 infra/gen-flag-hashes.py
      FLAG_P0_SHA256: "2a5e4ee9e80c31f92a6c968f0ea08c1dc9c49967df8a3a3fb18e640188da997a"
      # Réquisitions 1 et 2 — relevé d'enquête : plusieurs champs au lieu d'un
      # jeton. Chaque variable peut contenir plusieurs empreintes (variantes de
      # saisie), séparées par des espaces. Régénérer : python3 infra/gen-releve-hashes.py
      FLAG_P1_SUSPECTS_SHA256: "dc8cc4b162358790cb0ad6af1be697bd6f3e154c0656b7179fc374311606dd49"
      FLAG_P1_TRANSPORTEUR_SHA256: "cdbba27050b540bb18d53da5e54be9b7e6d851a3b737baa12b960d48338c8143 a4b6174b77106a9403bc2754f9f388582ae57a219a61ac8514632e05de3984a0"
      FLAG_P1_DATE_SHA256: "62323a999532855a490ec48ecd3b7d9e311deba2e7f3413b6e01a280ae64e250 2dfdfffb542e494be666cc5df38c52436f1b94b439a6a36f50427baf15a848df 6ed8823aa95d0baa1d9f49db915b2b41ea52b0a6461cfd1ad755f0084d923d4e"
      FLAG_P1_COLIS_SHA256: "3d26eb2fdcc96eb2cc660beb8b0f070d4334329ce3a43cfd3356b14eb01a98a3 808e051ff71d06995d0702deae5eca2e4bb00ace89bbd92ed0e717d31ac68cf3"
      FLAG_P2_CLIENTS_SHA256: "4a44dc15364204a80fe80e9039455cc1608281820fe2b24f1e5233ade6af1dd5"
