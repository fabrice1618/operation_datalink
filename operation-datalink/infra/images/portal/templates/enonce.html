{% extends "base.html" %}
{% block title %}{{ label }} — Opération Datalink{% endblock %}
{% block content %}

<div style="display:grid; grid-template-columns:210px 1fr; gap:1.5rem; align-items:start;">

  <!-- Sidebar -->
  <div class="card" style="position:sticky;top:72px;">
    <div class="card-header"><span>Dossiers</span></div>
    <div>
      {% for slug, lbl in files %}
      <a href="{{ url_for('enonce_view', slug=slug) }}"
         class="sidebar-link {% if slug == current %}active{% endif %}">
        {{ lbl }}
      </a>
      {% endfor %}
    </div>
  </div>

  <!-- Document -->
  <div class="card">
    <div class="card-header">
      <div class="flex-center gap-sm">
        <span style="color:var(--accent);opacity:.7;">▣</span>
        <span class="label">{{ label }}</span>
      </div>
      <a href="{{ url_for('enonce_list') }}" class="btn btn-secondary"
         style="padding:.18rem .6rem;font-size:.63rem;">← Retour</a>
    </div>
    <div class="card-body" style="padding:1.75rem 2rem;line-height:1.8;">
      <div class="prose">{{ content | safe }}</div>
    </div>
  </div>

</div>

<style>
  @media (max-width: 768px) {
    div[style*="grid-template-columns:210px"] {
      grid-template-columns: 1fr !important;
    }
    .card[style*="position:sticky"] {
      position: static !important;
    }
  }
</style>
{% endblock %}
