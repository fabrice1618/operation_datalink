{% extends "base.html" %}
{% block title %}{{ label }} — Opération Datalink{% endblock %}
{% block content %}

<div class="enonce-layout">

  <!-- Index latéral -->
  <div class="ascii-frame sidebar-frame">
    <div class="frame-title">Dossiers</div>
    <div class="frame-body" style="padding: var(--space-4) var(--space-2);">
      {% for slug, lbl in files %}
      <a href="{{ url_for('enonce_view', slug=slug) }}"
         class="side-link {% if slug == current %}active{% endif %}">
        {{ lbl }}
      </a>
      {% endfor %}
    </div>
  </div>

  <!-- Document -->
  <div class="ascii-frame">
    <div class="frame-title">▣ {{ label }}</div>
    <div class="frame-right">
      <a href="{{ url_for('enonce_list') }}" class="btn btn-secondary"
         style="font-size: var(--fs-xs); padding: 0;">← Retour</a>
    </div>
    <div class="frame-body" style="padding: var(--space-8);">
      <div class="prose">{{ content | safe }}</div>
    </div>
  </div>

</div>

<style>
  .enonce-layout {
    display: grid; grid-template-columns: 240px 1fr;
    gap: var(--space-6); align-items: start;
  }
  .sidebar-frame { position: sticky; top: calc(var(--header-height) + 1.25rem); }
  @media (max-width: 768px) {
    .enonce-layout { grid-template-columns: 1fr; }
    .sidebar-frame { position: static; }
  }
</style>
{% endblock %}
